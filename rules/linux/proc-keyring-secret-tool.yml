title: secret-tool invoked (libsecret keyring access)
id: 8b7c4d00-0001-4000-8000-000000000020
status: experimental
description: |
  secret-tool is the libsecret CLI for searching / dumping the user's
  GNOME keyring. T1555 (Credentials from Password Stores). Excludes
  invocations whose parent is a known desktop component (legitimate
  GNOME keyring plumbing). On server deployments without a desktop
  environment, every fire is signal-worthy; on workstations the
  remaining noise is users typing `secret-tool` in a terminal — which
  we cannot disambiguate without grandparent context.
level: medium
tags:
  - attack.credential_access
  - attack.t1555
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    Image|endswith:
      - /secret-tool
  desktop_component_parent:
    ParentImage|endswith:
      - /gnome-keyring-daemon
      - /gnome-shell
      - /gnome-session-binary
      - /Xwayland
      - /dbus-daemon
      - /dbus-broker
  condition: selection and not desktop_component_parent
