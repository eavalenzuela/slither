title: AWS credentials file accessed by a non-AWS-tooling actor
id: 8b7c4d00-0001-4000-8000-00000000001e
status: experimental
description: |
  Filesystem access to a path containing /.aws/credentials by a process
  that isn't a known legitimate AWS-tooling reader (awscli, aws-vault,
  terraform, opentofu, the Python interpreter for boto3 callers).
  T1552.001 (Unsecured Credentials: Credentials In Files). The actor
  allowlist is what makes this not fire on every `aws s3 ls`; an
  attacker `cat`/`cp`/`base64`/`curl`-ing the file still trips.
level: high
tags:
  - attack.credential_access
  - attack.t1552.001
logsource:
  product: linux
  category: file_event
detection:
  selection:
    TargetFilename|contains:
      - /.aws/credentials
  legit_reader:
    Image|endswith:
      - /aws
      - /aws-vault
      - /terraform
      - /tofu
      - /opentofu
      - /python
      - /python3
  condition: selection and not legit_reader
