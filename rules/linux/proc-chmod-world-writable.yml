title: chmod opening world-writable bits
id: 8b7c4d00-0001-4000-8000-000000000008
description: chmod 777 / 666 / o+w on files — rare during normal operation, common in attacker scripts.
level: medium
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    Image|endswith: /chmod
    CommandLine|regex:
      - '\s(777|666|0?(7|6)7(7|6))\s'
      - '\so\+w\b'
  condition: selection
