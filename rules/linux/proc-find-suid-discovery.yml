title: find with suid permission search
id: 8b7c4d00-0001-4000-8000-000000000005
description: find -perm -4000 is a canonical privilege-escalation reconnaissance pattern.
level: medium
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    Image|endswith: /find
    CommandLine|contains:
      - '-perm -4000'
      - '-perm -u+s'
      - '-perm -2000'
  condition: selection
