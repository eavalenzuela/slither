title: zip archive created with a password
id: 8b7c4d00-0001-4000-8000-00000000002d
status: experimental
description: |
  zip / 7z invoked with a password flag (-P / -p). T1560.002 (Archive
  via Library) — encrypted-archive staging is overwhelmingly used to
  bypass DLP / EDR content inspection on exfil paths.
level: medium
tags:
  - attack.collection
  - attack.t1560.002
logsource:
  product: linux
  category: process_creation
detection:
  archiver:
    Image|endswith:
      - /zip
      - /7z
      - /7za
      - /7zz
  password_flag:
    CommandLine|contains:
      - ' -P '
      - ' -p '
      - ' --password='
      - ' --password '
  condition: archiver and password_flag
