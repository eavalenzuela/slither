title: GPG secret key material exported
id: 8b7c4d00-0001-4000-8000-000000000043
status: experimental
description: |
  gpg / gpg2 invoked with --export-secret-keys or --export-secret-subkeys,
  which serialises private key material out of the keyring. T1552.004
  (Unsecured Credentials: Private Keys). Exporting secret keys is a
  deliberate and uncommon act; legitimate key-backup tooling does it
  occasionally, hence medium rather than high.
level: medium
tags:
  - attack.credential_access
  - attack.t1552.004
logsource:
  product: linux
  category: process_creation
detection:
  gpg:
    Image|endswith:
      - /gpg
      - /gpg2
  export_secret:
    CommandLine|contains:
      - '--export-secret-keys'
      - '--export-secret-subkeys'
  condition: gpg and export_secret
