title: dig/nslookup TXT or NULL query against a reserved TLD
id: 8b7c4d00-0001-4000-8000-000000000021
status: experimental
description: |
  dig / host / nslookup invoked with a TXT, NULL, or CNAME query type
  against an RFC2606 reserved TLD (.invalid, .test, .example, .localhost).
  TXT / NULL queries to reserved TLDs are a hallmark of DNS-as-C2 beaconing
  and never a legitimate operational pattern. T1071.004 (DNS C2).
level: high
tags:
  - attack.command_and_control
  - attack.t1071.004
logsource:
  product: linux
  category: process_creation
detection:
  resolver:
    Image|endswith:
      - /dig
      - /host
      - /nslookup
      - /drill
  query_type:
    CommandLine|contains:
      - ' TXT '
      - ' TXT'
      - ' NULL '
      - ' NULL'
      - ' CNAME '
      - ' CNAME'
  reserved_tld:
    CommandLine|contains:
      - .invalid
      - .test
      - .example
      - .localhost
  condition: resolver and query_type and reserved_tld
