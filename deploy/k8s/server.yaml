# Phase 5 #93 — Slither server Deployment + Service.
#
# Single-replica reference shape. Postgres + ClickHouse live outside
# this manifest (CloudSQL / Aiven / Altinity Cloud / etc.); the server
# reads connection strings via env. For a self-contained k8s deploy,
# kustomize this with stateful-set sidecars or pull the compose stack's
# pg/ch into helm subcharts — both deferred to operator preference.
#
# Operator must:
#   1. Create Secret `slither-server-config` with keys
#      SLITHER_STORAGE_POSTGRES_DSN + SLITHER_STORAGE_CLICKHOUSE_DSN.
#   2. Create Secret `slither-server-pki` with the mTLS material
#      (server.crt, server.key, ca.crt) — generated via gen-ca.sh
#      or your existing internal PKI.
#   3. Run `kubectl create job slither-db-migrate` with the same image,
#      command `slither-db migrate-up` to apply pg migrations before
#      the deployment lands. (Phase 5 #99 ships the analogous
#      slither-ch tooling for ClickHouse.)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slither-server
  namespace: slither
  labels:
    app.kubernetes.io/name: slither-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: slither
spec:
  # Single replica for v1. Multi-replica needs leader election on the
  # rule-NOTIFY watcher path (#39) — Phase 6+ work.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: slither-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: slither-server
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: slither
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: slither-server
          image: ghcr.io/t3rmit3/slither/server:latest
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/slither/server.yaml
          ports:
            - name: grpc
              containerPort: 9443
              protocol: TCP
            - name: enroll
              containerPort: 9444
              protocol: TCP
            - name: console
              containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: slither-server-config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          volumeMounts:
            - name: pki
              mountPath: /etc/slither/pki
              readOnly: true
            - name: config
              mountPath: /etc/slither
              readOnly: true
            - name: graphs
              mountPath: /var/lib/slither/graphs
            - name: artefacts
              mountPath: /var/lib/slither/artefacts
          readinessProbe:
            httpGet:
              path: /healthz
              port: console
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: console
            periodSeconds: 30
      volumes:
        - name: pki
          secret:
            secretName: slither-server-pki
            defaultMode: 0400
        - name: config
          configMap:
            name: slither-server-yaml
            items:
              - key: server.yaml
                path: server.yaml
        # Phase 3 #64 / #65 graph cache + Phase 4 #81 collect_artifacts
        # spool. emptyDir is fine for v1; switch to PVCs in production
        # if forensic-collected artefacts must survive pod restart.
        - name: graphs
          emptyDir:
            sizeLimit: 1Gi
        - name: artefacts
          emptyDir:
            sizeLimit: 4Gi

---
apiVersion: v1
kind: Service
metadata:
  name: slither-server
  namespace: slither
  labels:
    app.kubernetes.io/name: slither-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: slither
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: slither-server
  ports:
    - name: grpc
      port: 9443
      targetPort: grpc
    - name: enroll
      port: 9444
      targetPort: enroll
    - name: console
      port: 8080
      targetPort: console
