# Slither agent — perf_event_open for BPF tracepoints.
#
# The agent attaches to sched_process_{exec,exit,fork} and friends via
# perf_event_open(PERF_TYPE_TRACEPOINT,...). Debian ships a kernel patch
# that defaults kernel.perf_event_paranoid to 3, which requires
# CAP_SYS_ADMIN for any tracepoint perf event — CAP_PERFMON is not
# sufficient at that level. Upstream / RHEL / Ubuntu default to 2, where
# CAP_PERFMON is accepted (which is what the systemd unit grants).
#
# Lower to 2 so the agent's capability-bounded loader can attach without
# also demanding CAP_SYS_ADMIN. Level 2 still forbids unprivileged users
# from using perf_event_open for kernel events.
kernel.perf_event_paranoid = 2
