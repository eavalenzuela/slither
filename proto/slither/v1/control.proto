// Control-plane messages pushed from server to agents over Session.
syntax = "proto3";

package slither.v1;

import "google/protobuf/timestamp.proto";

// RuleSet is a versioned bundle of compiled edge rules pushed to agents.
// Agents swap their active ruleset atomically.
message RuleSet {
  string control_id = 1;
  string version = 2;           // monotonic server-assigned
  google.protobuf.Timestamp compiled_at = 3;
  repeated EdgeRule rules = 4;

  // Small-IOC feeds (hashes, IPs, domains) for on-edge matching.
  // Full-size feeds (>100k) stay server-side; see PROJECT.md §3.6.
  repeated IocFeed ioc_feeds = 5;
}

// EdgeRule is the wire form of a Sigma rule compiled for agent-side evaluation.
// The concrete match-AST shape is defined in pkg/ruleast and versioned with
// the RuleSet.version rather than the protobuf schema.
message EdgeRule {
  string rule_id = 1;
  string name = 2;
  uint32 severity = 3;          // maps to Severity enum
  bool auto_respond = 4;
  bool immediate = 5;           // §3.6 immediate response coupling
  repeated string mitre_ids = 6;

  // Opaque serialized AST. Agents compiled against the same ruleast version
  // as the server decode this; on version mismatch the agent rejects the ruleset
  // and reports via DiagReport.
  bytes compiled_ast = 7;
  uint32 ast_version = 8;

  // Bounded-stateful runtime metadata, populated by the compiler for
  // ast_version >= 2 (Phase 3 #54d / ADR-0032). Both zero for stateless
  // rules. Agents enforce ADR-0018 hard caps at runtime even if a
  // misconfigured server pushes an over-cap rule:
  //   state_window_secs > 300 → DiagReport.warnings: state_window_too_large
  //   state_cap         > 1024 → DiagReport.warnings: state_cap_too_large
  uint32 state_window_secs = 9;
  uint32 state_cap = 10;
}

message IocFeed {
  string feed_id = 1;
  FeedKind kind = 2;
  repeated string entries = 3;
}

enum FeedKind {
  FEED_KIND_UNSPECIFIED = 0;
  FEED_KIND_SHA256 = 1;
  FEED_KIND_IPV4 = 2;
  FEED_KIND_IPV6 = 3;
  FEED_KIND_DOMAIN = 4;
  FEED_KIND_FILENAME = 5;
}

// ResponseRequest asks the agent to perform a response action on a specific
// target. Requests are audited on the server before dispatch.
message ResponseRequest {
  string control_id = 1;
  string operator_id = 2;
  ResponseAction action = 3;
  string target = 4;            // pid, path, host_id depending on action
  google.protobuf.Timestamp deadline = 5;
  // parent_action_id is set on reversal requests (Phase 4 #85). When
  // present, the agent's handler reads the parent's sidecar/state to
  // perform the inverse: a QUARANTINE_FILE with a parent_action_id
  // means "restore the file to its original path". UNISOLATE_HOST
  // already reverses ISOLATE_HOST natively; parent_action_id only
  // wires the audit chain for those.
  string parent_action_id = 6;
  // rule_uid is populated for agent-initiated rule-driven actions
  // (Phase 4 #83). Stays empty for server-initiated requests; the
  // server's response_actions row already carries the uid in pg.
  // The agent's executor echoes this on ResponseResult.rule_uid so
  // the server's OnResult can insert a fresh row for an unknown
  // control_id without ambiguity.
  string rule_uid = 7;
}

enum ResponseAction {
  RESPONSE_ACTION_UNSPECIFIED = 0;
  RESPONSE_ACTION_KILL_PROCESS = 1;
  RESPONSE_ACTION_KILL_PROCESS_TREE = 2;
  RESPONSE_ACTION_QUARANTINE_FILE = 3;
  RESPONSE_ACTION_ISOLATE_HOST = 4;
  RESPONSE_ACTION_UNISOLATE_HOST = 5;
  RESPONSE_ACTION_COLLECT_ARTIFACTS = 6;
}

// ResponseResult is the agent's reply for one ResponseRequest. Phase 4
// #73 wire bump per ADR-0034 — additive within slither.v1; v0 agents
// that never emit it stay compatible.
message ResponseResult {
  // control_id echoes ResponseRequest.control_id so the server can
  // correlate without an extra lookup.
  string control_id = 1;
  // action_id is the response_actions row id; populated when the
  // server dispatched the action with one (the dispatcher always
  // does). Empty for ResponseRequests sent ad-hoc / for testing.
  string action_id = 2;
  ResponseStatus status = 3;
  // detail is a human-readable message — error string on failure or
  // a one-line summary on success ("killed pid 12345 with SIGTERM").
  string detail = 4;
  // result_blob carries the COLLECT_ARTIFACTS tarball and is empty
  // for every other action.
  bytes result_blob = 5;
  // Phase 4 #83 fields populated only by agent-initiated (rule-
  // driven) actions. The server's dispatcher knows nothing about
  // these — control_id is fresh on the agent — so the server's
  // OnResult inserts a response_actions row with rule_uid set and
  // status starting at `running` when it sees a result whose
  // control_id has no matching row. operator_id stays NULL.
  string rule_uid = 6;
  ResponseAction action = 7;
  string target = 8;
}

enum ResponseStatus {
  RESPONSE_STATUS_UNSPECIFIED = 0;
  RESPONSE_STATUS_DONE = 1;
  RESPONSE_STATUS_FAILED = 2;
}

// HostPolicy is the per-host response-action policy ADR-0034
// describes. The server pushes a HostPolicy on Session open and on
// every policy edit; the agent caches it and consults the cache from
// the auto-respond gate. Default value (all-false) is the
// detect-only baseline a fresh enrolment receives until an operator
// promotes the host.
message HostPolicy {
  bool allow_kill_process = 1;
  bool allow_kill_tree = 2;
  bool allow_quarantine = 3;
  // allow_isolate covers both ISOLATE_HOST and UNISOLATE_HOST per
  // ADR-0034 — reverse actions inherit the parent permission.
  bool allow_isolate = 4;
  bool allow_collect = 5;
  // version is a server-side monotonic so the agent can detect
  // out-of-order delivery (the per-session hub channel is
  // capacity-1 drop-stale, same shape as RuleSet).
  string version = 6;
}

// HuntQuery distributes a one-shot query to matching hosts.
// Phase 6 #110 — fields beyond the original {control_id, operator_id,
// backend, query, deadline} skeleton are additive within slither.v1
// per ADR-0011's wire-freeze contract.
message HuntQuery {
  string control_id = 1;
  string operator_id = 2;
  HuntBackend backend = 3;
  string query = 4;             // backend-specific query text
  google.protobuf.Timestamp deadline = 5;
  // max_rows caps the per-host row count the agent forwards. The
  // extension may emit more, but the agent's enforcement layer
  // truncates and stamps the truncation in HuntResultComplete.error.
  // Zero means "no cap" (operators must opt out explicitly).
  uint32 max_rows = 6;
  // timeout_secs is the hard deadline the agent enforces on the
  // extension's response. After it elapses, the agent emits a
  // HuntResultComplete carrying error="timeout" and abandons any
  // subsequent rows from the extension. Zero defaults to 60s.
  uint32 timeout_secs = 7;
}

enum HuntBackend {
  HUNT_BACKEND_UNSPECIFIED = 0;
  HUNT_BACKEND_OSQUERY = 1;
}

// HuntResult is one chunk of a hunt response from agent → server.
// Phase 6 #110 (additive within slither.v1).
//
// Multiple HuntResult messages may arrive for one control_id: any
// number carrying rows, then exactly one carrying complete. Empty-
// result hunts produce a single message with rows=[] and complete set.
message HuntResult {
  // control_id echoes HuntQuery.control_id; the server uses it to bind
  // results to the dispatched hunt.
  string control_id = 1;
  // rows are the per-row chunks. The agent batches them to amortise
  // per-message gRPC overhead. Each row's columns + values arrays are
  // co-indexed.
  repeated HuntResultRow rows = 2;
  // complete is set on the last message only. error is empty on
  // success; carries "timeout" / "extension error: ..." / "no
  // extension declares live_query_respond" / "row cap exceeded
  // (truncated at N)" otherwise.
  HuntResultComplete complete = 3;
}

message HuntResultRow {
  repeated string columns = 1;
  repeated string values = 2;
}

message HuntResultComplete {
  // row_count is the total number of rows the agent forwarded for this
  // hunt (after row-cap truncation). Useful for the console's per-host
  // attribution row count.
  uint64 row_count = 1;
  // error is the terminal status. Empty string == success.
  string error = 2;
}

// ConfigUpdate pushes agent-side config changes without requiring restart.
message ConfigUpdate {
  string control_id = 1;
  map<string, string> settings = 2;
  bool diag_request = 3;
  bool request_shutdown = 4;
}
