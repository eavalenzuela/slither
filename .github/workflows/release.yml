name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: build and sign, but do not publish"
        required: false
        default: "true"

permissions:
  contents: write          # create releases
  packages: write          # publish container images to GHCR
  id-token: write          # cosign keyless via OIDC

jobs:
  release:
    name: Build + sign + publish
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Phase 5 #89 — track the workspace's pinned toolchain so
          # release builds match `make verify-reproducible`.
          go-version-file: go.work
          cache: true
          cache-dependency-path: |
            agent/go.sum
            server/go.sum
            pkg/go.sum
            tools/go.sum

      - name: Install system packages
        run: |
          sudo apt-get update
          # Phase 5 #89 — same clang/llvm pin as ci.yml.
          sudo apt-get install -y clang-14 llvm-14 libbpf-dev
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-14 100
          sudo update-alternatives --install /usr/bin/llc   llc   /usr/bin/llc-14   100

      - name: Install Go tools
        run: make tools

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Determine version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binaries (linux/amd64 + linux/arm64)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        # Phase 5 #89 build flags inline. Cross-compile loop deviates
        # from `make build` only in setting GOOS/GOARCH per iteration;
        # the rest (-trimpath -buildvcs=true -mod=readonly + -ldflags)
        # mirrors GO_BUILD_FLAGS so release artefacts inherit the same
        # reproducibility properties verify-reproducible asserts.
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            for bin in agent server; do
              dir="dist/slither-$bin-linux-$arch"
              mkdir -p "$dir"
              (cd $bin && GOOS=linux GOARCH=$arch CGO_ENABLED=0 \
                go build -trimpath -buildvcs=true -mod=readonly \
                  -ldflags="-s -w -X github.com/t3rmit3/slither/pkg/version.Version=$VERSION" \
                  -o "../$dir/slither-$bin" ./cmd/slither-$bin)
              cp LICENSE README.md "$dir/"
              tar -C dist -czf "$dir.tar.gz" "$(basename $dir)"
            done
          done

      - name: Generate SBOMs (SPDX-JSON + CycloneDX-JSON)
        # Phase 5 #90 — both formats per ADR-0035 so consumers in
        # either ecosystem (SPDX, CycloneDX) get a verifiable BOM.
        # scripts/sbom.sh wraps `syft` with consistent output naming
        # and is also reusable from #92 (deb/rpm) + #93 (OCI).
        run: |
          for tar in dist/*.tar.gz; do
            scripts/sbom.sh "$tar" "$(dirname "$tar")"
          done
          ls -la dist/*.sbom.json* dist/*.cyclonedx.json 2>/dev/null || true

      - name: Sign artifacts (keyless)
        # Phase 5 #91 — cosign keyless via GitHub OIDC over every
        # release artefact (binaries, SBOMs in both formats). The
        # certificate identity proves the signature came from this
        # workflow at this commit; verifiers gate on it via
        # `cosign verify-blob --certificate-identity-regexp`.
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for f in dist/*.tar.gz dist/*.spdx.json dist/*.cyclonedx.json; do
            [ -e "$f" ] || continue
            cosign sign-blob --yes "$f" --output-signature "$f.sig" --output-certificate "$f.pem"
          done

      - name: Publish release
        if: ${{ startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.spdx.json
            dist/*.cyclonedx.json
            dist/*.sig
            dist/*.pem

      - name: Dry-run summary
        if: ${{ !(startsWith(github.ref, 'refs/tags/v')) || inputs.dry_run == 'true' }}
        run: |
          echo "Dry run — no release published."
          ls -la dist/
