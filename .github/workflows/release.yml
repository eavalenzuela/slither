name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: build and sign, but do not publish"
        required: false
        default: "true"

permissions:
  contents: write          # create releases
  packages: write          # publish container images to GHCR
  id-token: write          # cosign keyless via OIDC

jobs:
  release:
    name: Build + sign + publish
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev

      - name: Install Go tools
        run: make tools

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Determine version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binaries (linux/amd64 + linux/arm64)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            for bin in agent server; do
              dir="dist/slither-$bin-linux-$arch"
              mkdir -p "$dir"
              (cd $bin && GOOS=linux GOARCH=$arch CGO_ENABLED=0 \
                go build -trimpath \
                  -ldflags="-s -w -X github.com/t3rmit3/slither/pkg/version.Version=$VERSION" \
                  -o "../$dir/slither-$bin" ./cmd/slither-$bin)
              cp LICENSE README.md "$dir/"
              tar -C dist -czf "$dir.tar.gz" "$(basename $dir)"
            done
          done

      - name: Generate SBOMs
        run: |
          for tar in dist/*.tar.gz; do
            syft "$tar" -o spdx-json > "$tar.sbom.json"
          done

      - name: Sign artifacts (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for f in dist/*.tar.gz dist/*.sbom.json; do
            cosign sign-blob --yes "$f" --output-signature "$f.sig" --output-certificate "$f.pem"
          done

      - name: Publish release
        if: ${{ startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sbom.json
            dist/*.sig
            dist/*.pem

      - name: Dry-run summary
        if: ${{ !(startsWith(github.ref, 'refs/tags/v')) || inputs.dry_run == 'true' }}
        run: |
          echo "Dry run — no release published."
          ls -la dist/
