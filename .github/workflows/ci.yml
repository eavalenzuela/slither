name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test-lint:
    name: build / test / lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Both kernel matrix entries from IMPLEMENTATION.md §3.10.
        # 22.04 ships kernel 5.15; 24.04 ships 6.8.
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: |
            agent/go.sum
            server/go.sum
            pkg/go.sum
            tools/go.sum

      - name: Install system packages (eBPF toolchain reserved for Phase 1+)
        run: |
          sudo apt-get update
          # Phase 5 #89 — pin clang/llvm to a specific major version
          # so bpf2go regen output stays stable across runner refreshes.
          # Ubuntu 22.04 + 24.04 both ship clang-14 / llvm-14 in their
          # default repos. Bumping requires regenerating the committed
          # bpf2go bytecode (which is path-stable but version-sensitive).
          sudo apt-get install -y clang-14 llvm-14 libbpf-dev
          sudo update-alternatives --install /usr/bin/clang       clang       /usr/bin/clang-14       100
          sudo update-alternatives --install /usr/bin/llc         llc         /usr/bin/llc-14         100
          sudo update-alternatives --install /usr/bin/llvm-strip  llvm-strip  /usr/bin/llvm-strip-14  100
          sudo update-alternatives --install /usr/bin/llvm-objcopy llvm-objcopy /usr/bin/llvm-objcopy-14 100

      - name: Install Go tools
        run: make tools

      - name: Verify generated code is up to date
        run: make verify-gen

      - name: Build
        run: make build

      - name: Unit tests
        run: make test

      - name: Lint + vulncheck
        run: make lint

  darwin:
    name: darwin build + portable tests
    runs-on: macos-14
    # Phase 7 #M-A2 — prove the agent compiles and its platform-portable
    # packages pass on a real macOS host. The Linux collectors / eBPF
    # generation are build-tagged out here; what runs on darwin is the
    # platform-neutral pipeline plus the non-Linux stubs (collector_other.go,
    # hasher_other.go, the respond/selfprotect/keystore _other.go shims).
    # macos-14 is arm64; a macos-13 (amd64) entry can be added later if the
    # amd64 darwin path needs native coverage. Endpoint Security collectors
    # (#M-B*) will flip build-agent-darwin to CGO_ENABLED=1 — still on this
    # runner, no cross-compile.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: |
            agent/go.sum
            server/go.sum
            pkg/go.sum
            tools/go.sum

      - name: Build agent (darwin/{arm64,amd64})
        run: make build-agent-darwin

      - name: Portable unit tests
        # Linux-tagged packages compile to empty on darwin and are skipped
        # by the ./... wildcard; the portable packages and _other.go stubs
        # run natively.
        run: cd agent && go test ./...

  reproducible:
    name: reproducible builds
    runs-on: ubuntu-24.04
    needs: build-test-lint
    # Phase 5 #89 — assert two consecutive `make build` invocations on
    # the same source tree produce byte-identical binaries. Catches
    # accidental dependence on $PWD, $HOSTNAME, build wall-clock, or
    # any non-deterministic codegen we haven't already tamed via
    # -trimpath / -buildvcs / -mod=readonly.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: |
            agent/go.sum
            server/go.sum
            pkg/go.sum
            tools/go.sum

      - name: Verify reproducible
        run: make verify-reproducible

  integration:
    name: integration tests (privileged)
    runs-on: ubuntu-24.04
    # Integration tests load eBPF programs into the runner kernel and drive
    # them with real syscalls. GitHub-hosted ubuntu-24.04 runners expose
    # /sys/kernel/btf/vmlinux and allow bpf(2) for the runner user with sudo,
    # so the privileged workflow runs there directly; if GH ever flips that
    # off, the contingency is a self-hosted runner (documented in
    # IMPLEMENTATION.md §3.11 item 11).
    needs: build-test-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: |
            agent/go.sum
            server/go.sum
            pkg/go.sum
            tools/go.sum

      - name: Verify BTF available
        run: test -f /sys/kernel/btf/vmlinux

      - name: Install system packages
        run: |
          sudo apt-get update
          # Phase 5 #89 — same clang/llvm pin as build-test-lint so
          # bpf2go regen produces matching bytecode across both jobs.
          sudo apt-get install -y clang-14 llvm-14 libbpf-dev linux-headers-$(uname -r)
          sudo update-alternatives --install /usr/bin/clang       clang       /usr/bin/clang-14       100
          sudo update-alternatives --install /usr/bin/llc         llc         /usr/bin/llc-14         100
          sudo update-alternatives --install /usr/bin/llvm-strip  llvm-strip  /usr/bin/llvm-strip-14  100
          sudo update-alternatives --install /usr/bin/llvm-objcopy llvm-objcopy /usr/bin/llvm-objcopy-14 100

      - name: Install Go tools
        run: make tools

      - name: Regenerate bpf2go artifacts
        # Integration tests load the compiled eBPF .o files embedded in the
        # Go wrappers. .o is generator-specific (clang version + build path)
        # so we always regenerate on the runner rather than trusting what's
        # checked in.
        run: make gen-bpf

      - name: Integration tests
        run: sudo -E env "PATH=$PATH" make test-integration
