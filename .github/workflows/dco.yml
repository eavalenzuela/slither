name: DCO

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco-check:
    name: Verify DCO signoff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify every commit has Signed-off-by
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          missing=()
          for sha in $(git rev-list "${BASE_SHA}..${HEAD_SHA}"); do
            author_name=$(git log -1 --format='%an' "$sha")
            author_email=$(git log -1 --format='%ae' "$sha")
            expected="Signed-off-by: ${author_name} <${author_email}>"
            body=$(git log -1 --format='%B' "$sha")

            if ! grep -Fxq "$expected" <<<"$body"; then
              # Fall back: any Signed-off-by line is acceptable if it matches
              # some committer in the commit trailers.
              if ! grep -Eq '^Signed-off-by: .+ <.+@.+>' <<<"$body"; then
                missing+=("$sha  ${author_name} <${author_email}>")
              fi
            fi
          done

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::The following commits lack a DCO signoff (use 'git commit -s'):"
            printf '  %s\n' "${missing[@]}"
            echo
            echo "See CONTRIBUTING.md for details."
            exit 1
          fi

          echo "All commits are DCO-signed."
